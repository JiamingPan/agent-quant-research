name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt
      - run: python -m pytest -q
      - run: python -m app.eval_harness --output /tmp/eval-results.json
      - run: diff -u eval/results.json /tmp/eval-results.json
      - run: docker build --tag agent-quant-research:ci .
